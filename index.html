<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Phonics Fun">
    <title>Phonics Fun 🎈 自然拼读乐园</title>
    <style>
        :root {
            --bg-start: #fdf2f8;
            --bg-end: #ede9fe;
            --card-bg: #ffffff;
            --pink: #f472b6;
            --pink-light: #fce7f3;
            --purple: #a78bfa;
            --purple-light: #ede9fe;
            --yellow: #fbbf24;
            --yellow-light: #fef3c7;
            --green: #34d399;
            --green-light: #d1fae5;
            --blue: #60a5fa;
            --blue-light: #dbeafe;
            --orange: #fb923c;
            --orange-light: #ffedd5;
            --red-soft: #f87171;
            --text: #4a3550;
            --text-light: #6b5b73;
            --shadow: 0 4px 20px rgba(139, 92, 246, 0.10);
            --shadow-lg: 0 12px 40px rgba(139, 92, 246, 0.15);
            --radius: 22px;
            --radius-sm: 14px;
            --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #fdf2f8 0%, #fce7f3 20%, #ede9fe 50%, #dbeafe 80%, #fef3c7 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: -80px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatBubble 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -70px;
            left: -50px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.22) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatBubble 7s ease-in-out 2s infinite reverse;
        }
        @keyframes floatBubble {
            0%,
            100% { transform: translate(0, 0) scale(1); }
            30% { transform: translate(20px, -30px) scale(1.15); }
            60% { transform: translate(-15px, -15px) scale(0.9); }
            85% { transform: translate(10px, -25px) scale(1.08); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            height: 100vh;
            height: 100dvh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 16px) 16px;
            gap: 0;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 6px;
            flex-shrink: 0;
            z-index: 10;
        }
        .star-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 8px 16px;
            box-shadow: var(--shadow);
            font-weight: 700;
            font-size: 17px;
            color: var(--text);
            transition: transform 0.3s var(--bounce);
        }
        .star-badge.pulse {
            animation: starPulse 0.5s var(--bounce);
        }
        @keyframes starPulse {
            0%,
            100% { transform: scale(1); }
            40% { transform: scale(1.25) rotate(-10deg); }
            70% { transform: scale(0.95) rotate(5deg); }
        }
        .star-badge .star-icon {
            font-size: 24px;
            filter: drop-shadow(0 2px 3px rgba(251, 191, 36, 0.5));
        }
        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--bounce);
            color: var(--text);
        }
        .btn-icon:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.12);
        }

        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            gap: 16px;
            padding: 4px 4px 8px 4px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .screen.active {
            display: flex;
        }
        .screen::-webkit-scrollbar {
            display: none;
        }

        .menu-header {
            text-align: center;
            padding: 10px 0 4px;
            flex-shrink: 0;
        }
        .menu-header .mascot {
            font-size: 72px;
            animation: bounceMascot 1.5s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 8px 16px rgba(244, 114, 182, 0.35));
        }
        @keyframes bounceMascot {
            0%,
            100% { transform: translateY(0); }
            25% { transform: translateY(-22px); }
            50% { transform: translateY(-6px); }
            75% { transform: translateY(-16px); }
        }
        .menu-title {
            font-size: 30px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            margin: 2px 0;
        }
        .menu-subtitle {
            font-size: 15px;
            color: var(--text-light);
            font-weight: 500;
        }

        .game-cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex-shrink: 0;
        }
        .game-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.25s var(--bounce);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .game-card:active {
            transform: scale(0.96);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.18);
        }
        .game-card.card-explore { border-color: #fce7f3; }
        .game-card.card-listen { border-color: #ede9fe; }
        .game-card.card-blend { border-color: #dbeafe; }
        .game-card .card-emoji {
            font-size: 44px;
            flex-shrink: 0;
            width: 56px;
            text-align: center;
        }
        .game-card .card-info { flex: 1; min-width: 0; }
        .game-card .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .game-card .card-desc {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .game-card .card-arrow {
            font-size: 22px;
            color: #c4b5cc;
            flex-shrink: 0;
        }

        .explore-display {
            text-align: center;
            flex-shrink: 0;
            padding: 8px 0;
        }
        .big-letter-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 130px;
            height: 150px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: all 0.3s var(--bounce);
            border: 4px solid #fce7f3;
            position: relative;
        }
        .big-letter-card:active {
            transform: scale(0.9);
            border-color: var(--pink);
            box-shadow: 0 20px 50px rgba(244, 114, 182, 0.25);
        }
        .big-letter-card .big-letter {
            font-size: 64px;
            font-weight: 900;
            color: var(--text);
            line-height: 1;
        }
        .big-letter-card .example-emoji {
            font-size: 38px;
            margin-top: 4px;
            transition: transform 0.3s var(--bounce);
        }
        .big-letter-card:active .example-emoji { transform: scale(1.3); }
        .tap-hint {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 6px;
            font-weight: 500;
            animation: hintPulse 2s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%,
            100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .letter-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            flex-shrink: 0;
            padding: 2px;
        }
        @media (max-width: 380px) {
            .letter-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
        }
        .letter-btn {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            border: 2.5px solid #e8dff0;
            background: var(--card-bg);
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s var(--bounce);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            min-height: 40px;
        }
        .letter-btn:active {
            transform: scale(0.85);
            background: #fce7f3;
            border-color: var(--pink);
            box-shadow: 0 6px 20px rgba(244, 114, 182, 0.2);
        }
        .letter-btn.selected {
            background: #fce7f3;
            border-color: var(--pink);
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.18);
            animation: selectedGlow 0.6s var(--bounce);
        }
        @keyframes selectedGlow {
            0% { box-shadow: 0 0 0 0px rgba(244, 114, 182, 0.5); }
            100% { box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.18); }
        }

        .listen-question-area {
            text-align: center;
            flex-shrink: 0;
            padding: 10px 0;
        }
        .speaker-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #ede9fe;
            background: var(--card-bg);
            font-size: 44px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s var(--bounce);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .speaker-btn:active {
            transform: scale(0.88);
            border-color: var(--purple);
            box-shadow: 0 20px 50px rgba(167, 139, 250, 0.3);
        }
        .speaker-btn.playing {
            animation: speakerWave 0.6s ease-in-out infinite;
            border-color: var(--purple);
            box-shadow: 0 0 0 16px rgba(167, 139, 250, 0.12);
        }
        @keyframes speakerWave {
            0%,
            100% { box-shadow: 0 0 0 8px rgba(167, 139, 250, 0.08); }
            50% { box-shadow: 0 0 0 22px rgba(167, 139, 250, 0.0); }
        }
        .listen-prompt {
            font-size: 15px;
            color: var(--text-light);
            margin-top: 8px;
            font-weight: 500;
        }

        .listen-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            flex-shrink: 0;
            padding: 4px;
        }
        .listen-option-btn {
            aspect-ratio: 1.3;
            border-radius: var(--radius);
            border: 3px solid #e8dff0;
            background: var(--card-bg);
            font-size: 40px;
            font-weight: 900;
            cursor: pointer;
            color: var(--text);
            transition: all 0.25s var(--bounce);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }
        .listen-option-btn:active { transform: scale(0.9); }
        .listen-option-btn.correct-flash {
            background: #d1fae5;
            border-color: var(--green);
            animation: correctFlash 0.7s var(--bounce);
        }
        @keyframes correctFlash {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            50% { transform: scale(1.08); box-shadow: 0 0 0 20px rgba(52, 211, 153, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
        .listen-option-btn.wrong-shake {
            animation: wrongShake 0.5s ease;
            border-color: var(--red-soft);
            background: #fef2f2;
        }
        @keyframes wrongShake {
            0%,
            100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
        }

        .blend-image-area { text-align: center; flex-shrink: 0; }
        .blend-emoji-display {
            font-size: 80px;
            display: inline-block;
            animation: bounceMascot 2s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(139, 92, 246, 0.2));
        }
        .blend-word-hint {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 2px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .blend-slots {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-shrink: 0;
            padding: 8px 0;
        }
        .blend-slot {
            width: 64px;
            height: 72px;
            border-radius: var(--radius-sm);
            border: 3px dashed #d4c8e0;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 900;
            color: var(--text);
            transition: all 0.3s var(--bounce);
            position: relative;
        }
        .blend-slot.filled {
            border-style: solid;
            border-color: var(--purple);
            background: #ede9fe;
            animation: slotFill 0.4s var(--bounce);
        }
        @keyframes slotFill {
            0% { transform: scale(0.7); border-color: var(--pink); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .blend-slot.active-slot {
            border-color: var(--yellow);
            border-style: solid;
            box-shadow: 0 0 0 6px rgba(251, 191, 36, 0.2);
            animation: activeSlotPulse 1s ease-in-out infinite;
        }
        @keyframes activeSlotPulse {
            0%,
            100% { box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.15); }
            50% { box-shadow: 0 0 0 12px rgba(251, 191, 36, 0.0); }
        }

        .blend-letter-choices {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
            padding: 4px;
        }
        .blend-choice-btn {
            width: 56px;
            height: 60px;
            border-radius: var(--radius-sm);
            border: 2.5px solid #e8dff0;
            background: var(--card-bg);
            font-size: 30px;
            font-weight: 800;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s var(--bounce);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .blend-choice-btn:active {
            transform: scale(0.85);
            background: #dbeafe;
            border-color: var(--blue);
        }
        .blend-choice-btn.used {
            opacity: 0.35;
            pointer-events: none;
            transform: scale(0.9);
            background: #f5f0f8;
            border-color: #e0d8e8;
        }

        .celebrate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .celebrate-text {
            font-size: 56px;
            animation: celebPop 0.8s var(--bounce) forwards;
            pointer-events: none;
            text-shadow: 0 8px 30px rgba(251, 191, 36, 0.5);
        }
        @keyframes celebPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; }
        }

        .confetti-particle {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            font-size: 24px;
            animation: confettiFall 1.2s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.3); opacity: 0; }
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            border: 2px solid #e8dff0;
            border-radius: 50px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.2s var(--bounce);
            flex-shrink: 0;
            align-self: flex-start;
        }
        .btn-back:active {
            transform: scale(0.93);
            background: #faf8fc;
        }

        .btn-next {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--purple);
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.35);
            transition: all 0.2s var(--bounce);
            flex-shrink: 0;
            align-self: center;
        }
        .btn-next:active {
            transform: scale(0.9);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.25);
        }

        .score-pop {
            position: fixed;
            pointer-events: none;
            z-index: 98;
            font-size: 28px;
            font-weight: 900;
            color: var(--yellow);
            text-shadow: 0 3px 10px rgba(251, 191, 36, 0.6);
            animation: scoreUp 0.9s ease-out forwards;
        }
        @keyframes scoreUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            30% { transform: translateY(-30px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-80px) scale(0.8); opacity: 0; }
        }

        @media (min-width: 440px) {
            .app-container {
                max-height: 900px;
                border-radius: 28px;
                margin: 10px;
                box-shadow: 0 20px 60px rgba(139, 92, 246, 0.15);
                background: rgba(255, 255, 255, 0.3);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
        }
        @media (max-height: 700px) {
            .letter-grid { gap: 5px; }
            .letter-btn { font-size: 17px; min-height: 34px; }
            .big-letter-card { width: 100px; height: 120px; }
            .big-letter-card .big-letter { font-size: 48px; }
            .blend-emoji-display { font-size: 56px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="top-bar">
        <button class="btn-icon" id="btnHome" title="主页" onclick="goMenu()">🏠</button>
        <div class="star-badge" id="starBadge">
            <span class="star-icon">⭐</span>
            <span id="starCount">0</span>
        </div>
        <button class="btn-icon" id="btnRepeat" title="再听一次" style="visibility:hidden;" onclick="repeatAction()">🔊</button>
    </div>

    <!-- 主菜单 -->
    <div class="screen active" id="screenMenu">
        <div class="menu-header">
            <div class="mascot">🦉</div>
            <div class="menu-title">Phonics Fun!</div>
            <div class="menu-subtitle">自然拼读乐园 · 点击开始游戏吧</div>
        </div>
        <div class="game-cards">
            <div class="game-card card-explore" onclick="goExplore()">
                <div class="card-emoji">🔤</div>
                <div class="card-info">
                    <div class="card-title">字母声音探索</div>
                    <div class="card-desc">点击字母听发音，认识字母朋友</div>
                </div>
                <div class="card-arrow">▶</div>
            </div>
            <div class="game-card card-listen" onclick="goListen()">
                <div class="card-emoji">👂</div>
                <div class="card-info">
                    <div class="card-title">听音找字母</div>
                    <div class="card-desc">听发音，选出正确的字母</div>
                </div>
                <div class="card-arrow">▶</div>
            </div>
            <div class="game-card card-blend" onclick="goBlend()">
                <div class="card-emoji">🧩</div>
                <div class="card-info">
                    <div class="card-title">拼读小火车</div>
                    <div class="card-desc">把字母拼在一起，读出单词</div>
                </div>
                <div class="card-arrow">▶</div>
            </div>
        </div>
    </div>

    <!-- 字母探索 -->
    <div class="screen" id="screenExplore">
        <button class="btn-back" onclick="goMenu()">← 返回</button>
        <div class="explore-display">
            <div class="big-letter-card" id="bigLetterCard" onclick="onBigLetterClick()">
                <span class="big-letter" id="bigLetter">A</span>
                <span class="example-emoji" id="exampleEmoji">🍎</span>
            </div>
            <div class="tap-hint">👆 点击大卡片听发音</div>
        </div>
        <div class="letter-grid" id="letterGrid"></div>
    </div>

    <!-- 听音选字母 -->
    <div class="screen" id="screenListen">
        <button class="btn-back" onclick="goMenu()">← 返回</button>
        <div class="listen-question-area">
            <button class="speaker-btn" id="speakerBtn" onclick="onSpeakerClick()">🔊</button>
            <div class="listen-prompt" id="listenPrompt">点击喇叭听发音，然后选出字母</div>
        </div>
        <div class="listen-options" id="listenOptions"></div>
        <button class="btn-next" id="btnNextListen" style="display:none;" onclick="nextListenQuestion()">下一题 →</button>
    </div>

    <!-- 拼读小火车 -->
    <div class="screen" id="screenBlend">
        <button class="btn-back" onclick="goMenu()">← 返回</button>
        <div class="blend-image-area">
            <div class="blend-emoji-display" id="blendEmoji">🐱</div>
            <div class="blend-word-hint" id="blendWordHint">_ _ _</div>
        </div>
        <div class="blend-slots" id="blendSlots"></div>
        <div class="blend-letter-choices" id="blendChoices"></div>
        <button class="btn-next" id="btnNextBlend" style="display:none;" onclick="nextBlendWord()">下一个单词 →</button>
    </div>
</div>

<div class="celebrate-overlay" id="celebrateOverlay"></div>

<script>
    // ========== 全局 DOM 引用 ==========
    const starBadge = document.getElementById('starBadge');
    const starCountEl = document.getElementById('starCount');
    const btnRepeat = document.getElementById('btnRepeat');
    const celebrateOverlay = document.getElementById('celebrateOverlay');
    const allScreens = [
        document.getElementById('screenMenu'),
        document.getElementById('screenExplore'),
        document.getElementById('screenListen'),
        document.getElementById('screenBlend')
    ];

    const bigLetterCard = document.getElementById('bigLetterCard');
    const bigLetter = document.getElementById('bigLetter');
    const exampleEmoji = document.getElementById('exampleEmoji');
    const letterGrid = document.getElementById('letterGrid');

    const speakerBtn = document.getElementById('speakerBtn');
    const listenPrompt = document.getElementById('listenPrompt');
    const listenOptions = document.getElementById('listenOptions');
    const btnNextListen = document.getElementById('btnNextListen');

    const blendEmoji = document.getElementById('blendEmoji');
    const blendWordHint = document.getElementById('blendWordHint');
    const blendSlots = document.getElementById('blendSlots');
    const blendChoices = document.getElementById('blendChoices');
    const btnNextBlend = document.getElementById('btnNextBlend');

    // ========== 状态 ==========
    let totalStars = parseInt(localStorage.getItem('phonicsFunStars') || '0');
    let currentScreen = 'screenMenu';
    let selectedLetter = 'A';
    let listenCorrectAnswer = '';
    let listenAnswered = false;
    let blendCurrentWord = null;
    let blendFilledSlots = [];
    let blendUsedChoices = new Set();
    let activeAudioElement = null; // 用于保存当前播放的 Audio

    // ========== 数据 ==========
    const letterData = {
        'A': { emoji: '🍎', word: 'apple' },
        'B': { emoji: '⚽', word: 'ball' },
        'C': { emoji: '🐱', word: 'cat' },
        'D': { emoji: '🐶', word: 'dog' },
        'E': { emoji: '🥚', word: 'egg' },
        'F': { emoji: '🐟', word: 'fish' },
        'G': { emoji: '🐐', word: 'goat' },
        'H': { emoji: '🎩', word: 'hat' },
        'I': { emoji: '🧊', word: 'igloo' },
        'J': { emoji: '🍯', word: 'jam' },
        'K': { emoji: '🪁', word: 'kite' },
        'L': { emoji: '🦁', word: 'lion' },
        'M': { emoji: '🌙', word: 'moon' },
        'N': { emoji: '👃', word: 'nose' },
        'O': { emoji: '🐙', word: 'octopus' },
        'P': { emoji: '🐷', word: 'pig' },
        'Q': { emoji: '👸', word: 'queen' },
        'R': { emoji: '🐰', word: 'rabbit' },
        'S': { emoji: '☀️', word: 'sun' },
        'T': { emoji: '🔝', word: 'top' },
        'U': { emoji: '☂️', word: 'umbrella' },
        'V': { emoji: '🚐', word: 'van' },
        'W': { emoji: '🌊', word: 'wave' },
        'X': { emoji: '🦊', word: 'fox' },
        'Y': { emoji: '🪀', word: 'yo-yo' },
        'Z': { emoji: '🦓', word: 'zebra' },
    };

    const cvcWords = [
        { word: 'cat', emoji: '🐱', hint: 'c-a-t' },
        { word: 'dog', emoji: '🐶', hint: 'd-o-g' },
        { word: 'pig', emoji: '🐷', hint: 'p-i-g' },
        { word: 'hen', emoji: '🐔', hint: 'h-e-n' },
        { word: 'bug', emoji: '🐛', hint: 'b-u-g' },
        { word: 'sun', emoji: '☀️', hint: 's-u-n' },
        { word: 'hat', emoji: '🎩', hint: 'h-a-t' },
        { word: 'bed', emoji: '🛏️', hint: 'b-e-d' },
        { word: 'cup', emoji: '🥤', hint: 'c-u-p' },
        { word: 'fox', emoji: '🦊', hint: 'f-o-x' },
        { word: 'bus', emoji: '🚌', hint: 'b-u-s' },
        { word: 'pen', emoji: '🖊️', hint: 'p-e-n' },
        { word: 'lip', emoji: '👄', hint: 'l-i-p' },
        { word: 'pot', emoji: '🍯', hint: 'p-o-t' },
        { word: 'nut', emoji: '🥜', hint: 'n-u-t' },
    ];

        // ========== 音频系统（移动端优化）==========
    // 优先使用 Web Speech API（本地合成，无需网络），有道API作为后备
    
    // 清理TTS文本
    function cleanTTSText(text) {
        return text.replace(/,/g, ' ').trim();
    }

    // 播放音频 - 必须在用户点击事件内调用！
    function speakNow(text) {
        if (!text) return;
        text = cleanTTSText(text);
        console.log('speakNow:', text);
        
        // 方案1（优先）：Web Speech API - 本地合成，移动端兼容性好
        if ('speechSynthesis' in window) {
            try {
                const synth = window.speechSynthesis;
                synth.cancel(); // 停止当前播放
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.volume = 1.0;
                utterance.pitch = 1.0;
                
                utterance.onstart = () => console.log('Speech started');
                utterance.onend = () => console.log('Speech ended');
                utterance.onerror = (e) => {
                    console.log('Speech error, trying Youdao TTS:', e.error);
                    speakWithYoudao(text); // 回退到有道TTS
                };
                
                console.log('Trying Web Speech API...');
                synth.speak(utterance);
                return; // 成功调用后立即返回
            } catch(e) {
                console.log('Web Speech API failed:', e.message);
            }
        }
        
        // 方案2（后备）：有道词典TTS
        speakWithYoudao(text);
    }
    
    // 使用有道TTS API
    function speakWithYoudao(text) {
        try {
            const audio = new Audio();
            audio.src = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2';
            audio.preload = 'auto';
            
            const promise = audio.play();
            if (promise) {
                promise.catch((e) => {
                    console.log('Youdao TTS failed:', e.message);
                });
            }
            console.log('Trying Youdao TTS...');
        } catch(e) {
            console.log('Youdao TTS creation failed:', e.message);
        }
    }
    
    // ========== 语音接口 ==========
    function speakLetter(letter) {
        console.log('speakLetter called:', letter);
        const data = letterData[letter];
        if (!data) {
            console.log('No data for letter:', letter);
            return;
        }
        const text = letter + ' ' + data.word;
        console.log('Speaking:', text);
        speakNow(text);
    }// ========== 语音接口 ==========
    function speakLetter(letter) {
        console.log('speakLetter called:', letter);
        const data = letterData[letter];
        if (!data) {
            console.log('No data for letter:', letter);
            return;
        }
        const text = letter + ' ' + data.word;
        console.log('Speaking:', text);
        playTTS(text);
    }

    function speakWord(word, slowBlend = false) {
        if (slowBlend) {
            const letters = word.split('');
            const spaced = letters.join(' . ');
            playTTS(spaced + ' . ' + word);
        } else {
            playTTS(word);
        }
    }

    function speakLetterSimple(letter) {
        playTTS(letter);
    }

    // ========== 屏幕切换 ==========
    function switchScreen(screenName) {
        currentScreen = screenName;
        allScreens.forEach(s => s.classList.remove('active'));
        const target = document.getElementById(screenName);
        if (target) target.classList.add('active');

        btnRepeat.style.visibility = (screenName === 'screenMenu') ? 'hidden' : 'visible';

        if (screenName === 'screenListen') {
            listenAnswered = false;
            btnNextListen.style.display = 'none';
            listenPrompt.textContent = '点击喇叭听发音，然后选出字母';
            buildListenRound();
        } else if (screenName === 'screenBlend') {
            blendFilledSlots = [];
            blendUsedChoices = new Set();
            btnNextBlend.style.display = 'none';
            buildBlendRound();
        } else if (screenName === 'screenExplore') {
            updateExploreDisplay();
        }

        const screenEl = document.getElementById(screenName);
        if (screenEl) screenEl.scrollTop = 0;
    }

    // 全局跳转函数
    function goMenu() { switchScreen('screenMenu'); }
    function goExplore() { switchScreen('screenExplore'); }
    function goListen() { switchScreen('screenListen'); }
    function goBlend() { switchScreen('screenBlend'); }

    // 重复按钮
    function repeatAction() {
        if (currentScreen === 'screenExplore') {
            speakLetter(selectedLetter);
        } else if (currentScreen === 'screenListen') {
            playListenSound();
        } else if (currentScreen === 'screenBlend' && blendCurrentWord) {
            speakWord(blendCurrentWord.word, true);
        }
    }

    // 大卡片点击
    function onBigLetterClick() {
        speakLetter(selectedLetter);
        bigLetterCard.style.transform = 'scale(0.88)';
        setTimeout(() => { bigLetterCard.style.transform = ''; }, 200);
    }

    // 喇叭点击
    function onSpeakerClick() {
        if (listenAnswered) return;
        playListenSound();
    }

    function nextListenQuestion() {
        listenAnswered = false;
        btnNextListen.style.display = 'none';
        listenPrompt.textContent = '点击喇叭听发音，然后选出字母';
        buildListenRound();
    }

    function nextBlendWord() {
        blendFilledSlots = [];
        blendUsedChoices = new Set();
        btnNextBlend.style.display = 'none';
        buildBlendRound();
    }

    // ========== 字母探索 ==========
    function buildLetterGrid() {
        letterGrid.innerHTML = '';
        const letters = Object.keys(letterData);
        letters.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.textContent = letter;
            btn.setAttribute('aria-label', '字母 ' + letter);
            btn.ontouchstart = function(e) {
                e.preventDefault();
                selectLetter(letter, btn);
            };
            btn.onclick = function() { selectLetter(letter, btn); };
            letterGrid.appendChild(btn);
        });
        const firstBtn = letterGrid.querySelector('.letter-btn');
        if (firstBtn) firstBtn.classList.add('selected');
    }

    function selectLetter(letter, btn) {
        selectedLetter = letter;
        updateExploreDisplay();
        speakLetter(letter);  // 直接播放，有用户手势
        document.querySelectorAll('.letter-grid .letter-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function updateExploreDisplay() {
        const data = letterData[selectedLetter];
        bigLetter.textContent = selectedLetter;
        exampleEmoji.textContent = data.emoji || '';
        document.querySelectorAll('.letter-grid .letter-btn').forEach(b => {
            b.classList.remove('selected');
            if (b.textContent === selectedLetter) b.classList.add('selected');
        });
    }

    // ========== 听音选字母 ==========
    function buildListenRound() {
        const letters = Object.keys(letterData);
        const correctLetter = letters[Math.floor(Math.random() * letters.length)];
        listenCorrectAnswer = correctLetter;

        const distractors = [];
        const pool = letters.filter(l => l !== correctLetter);
        shuffleArray(pool);
        for (let i = 0; i < 3; i++) distractors.push(pool[i]);

        const options = [correctLetter, ...distractors];
        shuffleArray(options);

        listenOptions.innerHTML = '';
        options.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'listen-option-btn';
            btn.textContent = letter;
            btn.setAttribute('aria-label', '选择字母 ' + letter);
            btn.ontouchstart = function(e) {
                e.preventDefault();
                handleListenChoice(letter, btn);
            };
            btn.onclick = function() { handleListenChoice(letter, btn); };
            listenOptions.appendChild(btn);
        });

        // 不再自动播放，提示用户点击喇叭
        listenPrompt.textContent = '点击喇叭听发音，然后选出字母';
    }

    function playListenSound() {
        if (listenAnswered) return;
        speakerBtn.classList.add('playing');
        const data = letterData[listenCorrectAnswer];
        // 播放字母和单词，逗号替换为空格
        playTTS(listenCorrectAnswer + ' ' + data.word).finally(() => {
            speakerBtn.classList.remove('playing');
        });
        listenPrompt.textContent = '仔细听...是哪个字母呢？🤔';
    }

    function handleListenChoice(chosenLetter, btnElement) {
        if (listenAnswered) return;
        listenAnswered = true;
        speakerBtn.classList.remove('playing');

        if (chosenLetter === listenCorrectAnswer) {
            btnElement.classList.add('correct-flash');
            addStars(1);
            spawnConfetti(btnElement);
            celebrateOverlay.innerHTML = '<span class="celebrate-text">🎉</span>';
            setTimeout(() => { celebrateOverlay.innerHTML = ''; }, 900);
            listenPrompt.textContent = '太棒了！✅ 答对啦！';
            playTTS('Good job');
        } else {
            btnElement.classList.add('wrong-shake');
            listenPrompt.textContent = `再试试吧～正确答案是 ${listenCorrectAnswer}`;
            const allOptionBtns = listenOptions.querySelectorAll('.listen-option-btn');
            allOptionBtns.forEach(b => {
                if (b.textContent === listenCorrectAnswer) b.classList.add('correct-flash');
            });
            playTTS(listenCorrectAnswer);
        }

        btnNextListen.style.display = 'inline-flex';
        listenOptions.querySelectorAll('.listen-option-btn').forEach(b => {
            b.style.pointerEvents = 'none';
        });
    }

    // ========== 拼读游戏 ==========
    function buildBlendRound() {
        const wordData = cvcWords[Math.floor(Math.random() * cvcWords.length)];
        blendCurrentWord = wordData;
        blendEmoji.textContent = wordData.emoji;
        blendWordHint.textContent = wordData.hint;

        const wordLetters = wordData.word.split('');
        const numSlots = wordLetters.length;

        const allLetters = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const distractors = [];
        const pool = allLetters.filter(l => !wordLetters.includes(l));
        shuffleArray(pool);
        for (let i = 0; i < Math.min(2, pool.length); i++) distractors.push(pool[i].toUpperCase());

        const allChoices = [...wordLetters.map(l => l.toUpperCase()), ...distractors];
        shuffleArray(allChoices);

        blendSlots.innerHTML = '';
        for (let i = 0; i < numSlots; i++) {
            const slot = document.createElement('div');
            slot.className = 'blend-slot';
            slot.dataset.index = i;
            if (i === 0 && blendFilledSlots.length === 0) slot.classList.add('active-slot');
            blendSlots.appendChild(slot);
        }

        blendChoices.innerHTML = '';
        allChoices.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'blend-choice-btn';
            btn.textContent = letter;
            btn.dataset.letter = letter;
            if (blendUsedChoices.has(letter)) btn.classList.add('used');
            btn.ontouchstart = function(e) {
                e.preventDefault();
                handleBlendChoice(letter, btn);
            };
            btn.onclick = function() { handleBlendChoice(letter, btn); };
            blendChoices.appendChild(btn);
        });

        blendFilledSlots = [];
        blendUsedChoices = new Set();
        updateBlendSlotHighlight();
    }

    function handleBlendChoice(letter, btnElement) {
        if (!blendCurrentWord || blendUsedChoices.has(letter)) return;
        const wordLetters = blendCurrentWord.word.split('');
        const nextIndex = blendFilledSlots.length;
        const expectedLetter = wordLetters[nextIndex].toUpperCase();

        if (letter === expectedLetter) {
            blendFilledSlots.push(letter);
            blendUsedChoices.add(letter);
            btnElement.classList.add('used');

            const slots = blendSlots.querySelectorAll('.blend-slot');
            if (slots[nextIndex]) {
                slots[nextIndex].textContent = letter;
                slots[nextIndex].classList.add('filled');
            }

            speakLetterSimple(letter); // 即时播放字母音
            updateBlendSlotHighlight();

            if (blendFilledSlots.length === wordLetters.length) {
                // 拼读完成，立即播放单词（在用户手势内）
                const fullWord = blendCurrentWord.word;
                speakWord(fullWord, true);
                addStars(2);
                spawnConfetti(blendSlots);
                celebrateOverlay.innerHTML = '<span class="celebrate-text">🌟</span>';
                setTimeout(() => { celebrateOverlay.innerHTML = ''; }, 1000);
                blendWordHint.textContent = fullWord.toUpperCase() + ' 🎉';
                btnNextBlend.style.display = 'inline-flex';
                blendChoices.querySelectorAll('.blend-choice-btn').forEach(b => {
                    if (!blendUsedChoices.has(b.dataset.letter)) b.classList.add('used');
                });
            }
        } else {
            btnElement.classList.add('wrong-shake');
            setTimeout(() => btnElement.classList.remove('wrong-shake'), 500);
            const hintLetter = wordLetters[nextIndex].toUpperCase();
            blinkSlot(nextIndex);
        }
    }

    function updateBlendSlotHighlight() {
        const slots = blendSlots.querySelectorAll('.blend-slot');
        slots.forEach((slot, i) => {
            slot.classList.remove('active-slot');
            if (i === blendFilledSlots.length && blendFilledSlots.length < (blendCurrentWord?.word.length || 0)) {
                slot.classList.add('active-slot');
            }
        });
    }

    function blinkSlot(index) {
        const slots = blendSlots.querySelectorAll('.blend-slot');
        if (slots[index]) {
            slots[index].style.borderColor = '#f87171';
            slots[index].style.boxShadow = '0 0 0 6px rgba(248,113,113,0.2)';
            setTimeout(() => {
                slots[index].style.borderColor = '';
                slots[index].style.boxShadow = '';
                updateBlendSlotHighlight();
            }, 600);
        }
    }

    // ========== 星星 ==========
    function updateStarDisplay(animate) {
        starCountEl.textContent = totalStars;
        if (animate) {
            starBadge.classList.remove('pulse');
            void starBadge.offsetWidth;
            starBadge.classList.add('pulse');
        }
        localStorage.setItem('phonicsFunStars', totalStars.toString());
    }

    function addStars(count) {
        totalStars += count;
        updateStarDisplay(true);
        const rect = starBadge.getBoundingClientRect();
        spawnScorePop(rect.left + rect.width / 2, rect.top, '+' + count + '⭐');
    }

    // ========== 视觉效果 ==========
    function spawnConfetti(sourceElement) {
        const rect = sourceElement.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const emojis = ['⭐', '🌟', '✨', '💖', '🎈', '🌈', '💫', '🎀', '🦋', '🌸'];
        for (let i = 0; i < 14; i++) {
            const particle = document.createElement('span');
            particle.className = 'confetti-particle';
            particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            particle.style.left = cx + 'px';
            particle.style.top = cy + 'px';
            const angle = Math.random() * Math.PI * 2;
            const distance = 60 + Math.random() * 140;
            particle.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
            particle.style.setProperty('--dy', Math.sin(angle) * distance - 40 - Math.random() * 100 + 'px');
            particle.style.setProperty('--rot', (Math.random() - 0.5) * 720 + 'deg');
            particle.style.animationDuration = (0.8 + Math.random() * 1.0) + 's';
            particle.style.fontSize = (18 + Math.random() * 20) + 'px';
            document.body.appendChild(particle);
            setTimeout(() => { if (particle.parentNode) particle.parentNode.removeChild(particle); }, 1500);
        }
    }

    function spawnScorePop(x, y, text) {
        const pop = document.createElement('span');
        pop.className = 'score-pop';
        pop.textContent = text;
        pop.style.left = x + 'px';
        pop.style.top = y + 'px';
        document.body.appendChild(pop);
        setTimeout(() => { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 1000);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ========== 首次交互激活音频（兼容微信/移动端）==========
    function unlockAll() {
        try { 
            unlockAudio(); 
        } catch(e) {
            console.log('Audio unlock error:', e);
        }
    }
    
    // 监听多种用户交互事件来确保音频被激活
    ['touchstart', 'touchend', 'click', 'pointerdown'].forEach(evt => {
        document.addEventListener(evt, unlockAll, { once: true });
    });
    
    // 额外的：在首次用户交互时再次尝试解锁
    document.addEventListener('touchstart', function() {
        setTimeout(unlockAudio, 100);
    }, { once: true });
    
    document.addEventListener('click', function() {
        setTimeout(unlockAudio, 100);
    }, { once: true });

    // 防止手势缩放
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    // ========== 启动 ==========
    function init() {
        updateStarDisplay(false);
        buildLetterGrid();
        buildListenRound();
        buildBlendRound();
        // 尝试立即解锁音频（可能在用户交互后调用）
        unlockAudio();
    }
    init();
</script>
