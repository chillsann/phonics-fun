<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phonics Fun 🎈 自然拼读乐园</title>
    <style>
        /* 完整保留之前的 CSS，此处为了突出重点仅保留关键样式，实际请用你原版完整CSS */
        :root { --bg-start: #fdf2f8; --bg-end: #ede9fe; --card-bg: #ffffff; --pink: #f472b6; --purple: #a78bfa; --yellow: #fbbf24; --text: #4a3550; --text-light: #6b5b73; --shadow: 0 4px 20px rgba(139,92,246,0.1); --shadow-lg: 0 12px 40px rgba(139,92,246,0.15); --radius: 22px; --radius-sm: 14px; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { height:100%; width:100%; overflow:hidden; font-family:system-ui; background:linear-gradient(160deg,#fdf2f8,#fce7f3,#ede9fe,#dbeafe,#fef3c7); display:flex; align-items:center; justify-content:center; }
        .app-container { width:100%; max-width:440px; height:100vh; display:flex; flex-direction:column; padding:12px 16px; }
        .top-bar { display:flex; justify-content:space-between; padding:8px 6px; }
        .star-badge { display:flex; align-items:center; gap:6px; background:var(--card-bg); border-radius:50px; padding:8px 16px; font-weight:700; font-size:17px; color:var(--text); }
        .btn-icon { width:44px; height:44px; border-radius:50%; background:var(--card-bg); border:none; font-size:22px; cursor:pointer; transition:0.1s; }
        .btn-icon:active { transform:scale(0.9); background:#f0e6ff; }
        .screen { display:none; flex-direction:column; flex:1; overflow-y:auto; gap:16px; padding:4px 4px 8px; }
        .screen.active { display:flex; }
        .menu-header { text-align:center; padding:10px 0; }
        .mascot { font-size:72px; animation:bounce 1.5s infinite; display:inline-block; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-22px)} 50%{transform:translateY(-6px)} 75%{transform:translateY(-16px)} }
        .menu-title { font-size:30px; font-weight:800; color:var(--text); }
        .menu-subtitle { font-size:15px; color:var(--text-light); }
        .game-cards { display:flex; flex-direction:column; gap:14px; }
        .game-card { display:flex; align-items:center; gap:14px; background:var(--card-bg); border-radius:var(--radius); padding:16px 18px; cursor:pointer; border:3px solid transparent; transition:0.1s; }
        .game-card:active { transform:scale(0.96); background:#faf0ff; }
        .card-emoji { font-size:44px; width:56px; text-align:center; }
        .card-info { flex:1; }
        .card-title { font-size:18px; font-weight:700; color:var(--text); }
        .card-desc { font-size:13px; color:var(--text-light); }
        .card-arrow { font-size:22px; color:#c4b5cc; }
        .big-letter-card { display:inline-flex; flex-direction:column; align-items:center; justify-content:center; width:130px; height:150px; background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow-lg); cursor:pointer; border:4px solid #fce7f3; transition:0.1s; }
        .big-letter-card:active { transform:scale(0.9); background:#fff0f5; }
        .big-letter { font-size:64px; font-weight:900; color:var(--text); }
        .example-emoji { font-size:38px; margin-top:4px; }
        .tap-hint { font-size:13px; color:var(--text-light); margin-top:6px; }
        .letter-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
        .letter-btn { aspect-ratio:1; border-radius:var(--radius-sm); border:2.5px solid #e8dff0; background:var(--card-bg); font-size:20px; font-weight:700; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; transition:0.1s; }
        .letter-btn:active { background:#fce7f3; border-color:var(--pink); transform:scale(0.9); }
        .letter-btn.selected { background:#fce7f3; border-color:var(--pink); }
        .speaker-btn { width:90px; height:90px; border-radius:50%; border:4px solid #ede9fe; background:var(--card-bg); font-size:44px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:0.1s; }
        .speaker-btn:active { transform:scale(0.9); background:#ede9fe; }
        .listen-options { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .listen-option-btn { aspect-ratio:1.3; border-radius:var(--radius); border:3px solid #e8dff0; background:var(--card-bg); font-size:40px; font-weight:900; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; transition:0.1s; }
        .listen-option-btn:active { transform:scale(0.9); background:#f0e6ff; }
        .blend-slots { display:flex; justify-content:center; gap:14px; }
        .blend-slot { width:64px; height:72px; border-radius:var(--radius-sm); border:3px dashed #d4c8e0; background:rgba(255,255,255,0.7); display:flex; align-items:center; justify-content:center; font-size:38px; font-weight:900; color:var(--text); }
        .blend-letter-choices { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; }
        .blend-choice-btn { width:56px; height:60px; border-radius:var(--radius-sm); border:2.5px solid #e8dff0; background:var(--card-bg); font-size:30px; font-weight:800; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; transition:0.1s; }
        .blend-choice-btn:active { transform:scale(0.85); background:#e8d5ff; }
        .blend-choice-btn.used { opacity:0.35; pointer-events:none; }
        .celebrate-overlay { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
        .celebrate-text { font-size:56px; animation:celebPop 0.8s ease; }
        @keyframes celebPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 50%{transform:scale(1.3) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:0} }
        .btn-back { display:inline-flex; align-items:center; gap:6px; background:var(--card-bg); border:2px solid #e8dff0; border-radius:50px; padding:10px 18px; font-size:15px; font-weight:600; cursor:pointer; color:var(--text); }
        .btn-back:active { transform:scale(0.93); }
        .btn-next { background:var(--purple); color:#fff; border:none; border-radius:50px; padding:12px 24px; font-size:16px; font-weight:700; cursor:pointer; }
        .btn-next:active { transform:scale(0.9); opacity:0.9; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="top-bar">
        <button class="btn-icon" onclick="goMenu()">🏠</button>
        <div class="star-badge" id="starBadge"><span>⭐</span> <span id="starCount">0</span></div>
        <button class="btn-icon" id="btnRepeat" style="visibility:hidden;" onclick="repeatAction()">🔊</button>
    </div>

    <div class="screen active" id="screenMenu">
        <div class="menu-header">
            <div class="mascot">🦉</div>
            <div class="menu-title">Phonics Fun!</div>
            <div class="menu-subtitle">点击卡片开始游戏吧</div>
        </div>
        <div class="game-cards">
            <div class="game-card" onclick="goExplore()">
                <div class="card-emoji">🔤</div>
                <div class="card-info"><div class="card-title">字母声音探索</div><div class="card-desc">点击字母听发音</div></div>
                <div class="card-arrow">▶</div>
            </div>
            <div class="game-card" onclick="goListen()">
                <div class="card-emoji">👂</div>
                <div class="card-info"><div class="card-title">听音找字母</div><div class="card-desc">听发音，选字母</div></div>
                <div class="card-arrow">▶</div>
            </div>
            <div class="game-card" onclick="goBlend()">
                <div class="card-emoji">🧩</div>
                <div class="card-info"><div class="card-title">拼读小火车</div><div class="card-desc">拼字母，读单词</div></div>
                <div class="card-arrow">▶</div>
            </div>
        </div>
    </div>

    <div class="screen" id="screenExplore">
        <button class="btn-back" onclick="goMenu()">← 返回</button>
        <div style="text-align:center;">
            <div class="big-letter-card" id="bigLetterCard" onclick="onBigLetterClick()">
                <span class="big-letter" id="bigLetter">A</span>
                <span class="example-emoji" id="exampleEmoji">🍎</span>
            </div>
            <div class="tap-hint">👆 点大卡片或下方字母听发音</div>
        </div>
        <div class="letter-grid" id="letterGrid"></div>
    </div>

    <div class="screen" id="screenListen">
        <button class="btn-back" onclick="goMenu()">← 返回</button>
        <div style="text-align:center;">
            <button class="speaker-btn" id="speakerBtn" onclick="onSpeakerClick()">🔊</button>
            <div id="listenPrompt" style="font-size:15px;color:#6b5b73;margin-top:8px;">点喇叭听发音，再选字母</div>
        </div>
        <div class="listen-options" id="listenOptions"></div>
        <button class="btn-next" id="btnNextListen" style="display:none;" onclick="nextListenQuestion()">下一题 →</button>
    </div>

    <div class="screen" id="screenBlend">
        <button class="btn-back" onclick="goMenu()">← 返回</button>
        <div style="text-align:center;">
            <div id="blendEmoji" style="font-size:80px;">🐱</div>
            <div id="blendWordHint" style="font-size:14px;color:#6b5b73;">_ _ _</div>
        </div>
        <div class="blend-slots" id="blendSlots"></div>
        <div class="blend-letter-choices" id="blendChoices"></div>
        <button class="btn-next" id="btnNextBlend" style="display:none;" onclick="nextBlendWord()">下一个单词 →</button>
    </div>
</div>

<div class="celebrate-overlay" id="celebrateOverlay"></div>

<script>
    // ========== DOM 与状态 ==========
    const starBadge = document.getElementById('starBadge');
    const starCountEl = document.getElementById('starCount');
    const btnRepeat = document.getElementById('btnRepeat');
    const celebrateOverlay = document.getElementById('celebrateOverlay');
    const allScreens = [
        document.getElementById('screenMenu'),
        document.getElementById('screenExplore'),
        document.getElementById('screenListen'),
        document.getElementById('screenBlend')
    ];
    const bigLetterCard = document.getElementById('bigLetterCard');
    const bigLetter = document.getElementById('bigLetter');
    const exampleEmoji = document.getElementById('exampleEmoji');
    const letterGrid = document.getElementById('letterGrid');
    const speakerBtn = document.getElementById('speakerBtn');
    const listenPrompt = document.getElementById('listenPrompt');
    const listenOptions = document.getElementById('listenOptions');
    const btnNextListen = document.getElementById('btnNextListen');
    const blendEmoji = document.getElementById('blendEmoji');
    const blendWordHint = document.getElementById('blendWordHint');
    const blendSlots = document.getElementById('blendSlots');
    const blendChoices = document.getElementById('blendChoices');
    const btnNextBlend = document.getElementById('btnNextBlend');

    let totalStars = parseInt(localStorage.getItem('phonicsFunStars') || '0');
    let currentScreen = 'screenMenu';
    let selectedLetter = 'A';
    let listenCorrectAnswer = '';
    let listenAnswered = false;
    let blendCurrentWord = null;
    let blendFilledSlots = [];
    let blendUsedChoices = new Set();

    // ========== 音频核心（完全参照 KET 游戏的成功方案） ==========
    let _ttsAudio = null;

    // 初始化并预激活音频元素（在首次用户交互时执行一次）
    function primeAudio() {
        if (_ttsAudio) return;
        _ttsAudio = new Audio();
        _ttsAudio.preload = 'auto';
        _ttsAudio.setAttribute('playsinline', 'true');
        _ttsAudio.setAttribute('webkit-playsinline', 'true');
        // 播放一段极短的静音片段来激活音频上下文
        _ttsAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
        _ttsAudio.play().then(() => {
            _ttsAudio.pause();
            _ttsAudio.currentTime = 0;
        }).catch(() => {
            // 静默失败，不影响后续
        });
    }

    // 页面加载后，只要有一次用户交互就激活音频
    const events = ['touchstart', 'touchend', 'click', 'pointerdown'];
    events.forEach(evt => {
        document.addEventListener(evt, primeAudio, { once: true });
    });

    // 获取有道 TTS URL（添加时间戳防缓存）
    function getTTSUrl(text) {
        return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2&_t=' + Date.now();
    }

    // 播放文本（所有按钮点击最终都调用这个函数）
    function speakNow(text) {
        if (!text) return;
        const clean = text.replace(/,/g, ' ').trim();
        // 确保音频元素存在（通常已存在，但双重保险）
        if (!_ttsAudio) primeAudio();
        if (!_ttsAudio) return;

        _ttsAudio.pause();
        _ttsAudio.src = getTTSUrl(clean);
        _ttsAudio.play().catch(() => {
            // 如果有道API失败，降级为浏览器内置语音
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(clean);
                u.lang = 'en-US';
                u.rate = 0.85;
                window.speechSynthesis.speak(u);
            }
        });
    }

    // 语音接口
    function speakLetter(letter) {
        const data = letterData[letter];
        if (!data) return;
        speakNow(letter + ' ' + data.word);
    }
    function speakWord(word, slowBlend = false) {
        if (slowBlend) {
            const arr = word.split('');
            speakNow(arr.join(' . ') + ' . ' + word);
        } else {
            speakNow(word);
        }
    }
    function speakLetterSimple(letter) { speakNow(letter); }

    // ========== 屏幕切换（绝不自动播放声音） ==========
    function switchScreen(name) {
        currentScreen = name;
        allScreens.forEach(s => s.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        btnRepeat.style.visibility = (name === 'screenMenu') ? 'hidden' : 'visible';

        if (name === 'screenListen') {
            listenAnswered = false;
            btnNextListen.style.display = 'none';
            listenPrompt.textContent = '点喇叭听发音，再选字母';
            buildListenRound();
        } else if (name === 'screenBlend') {
            blendFilledSlots = [];
            blendUsedChoices = new Set();
            btnNextBlend.style.display = 'none';
            buildBlendRound();
        } else if (name === 'screenExplore') {
            updateExploreDisplay();
        }
        const el = document.getElementById(name);
        if (el) el.scrollTop = 0;
    }

    function goMenu() { switchScreen('screenMenu'); }
    function goExplore() { switchScreen('screenExplore'); }
    function goListen() { switchScreen('screenListen'); }
    function goBlend() { switchScreen('screenBlend'); }

    // 顶部栏的重复按钮
    function repeatAction() {
        if (currentScreen === 'screenExplore') speakLetter(selectedLetter);
        else if (currentScreen === 'screenListen') {
            if (!listenAnswered) speakNow(listenCorrectAnswer + ' ' + letterData[listenCorrectAnswer].word);
        }
        else if (currentScreen === 'screenBlend' && blendCurrentWord) speakWord(blendCurrentWord.word, true);
    }

    // 大字母卡片点击
    function onBigLetterClick() {
        speakLetter(selectedLetter);
        bigLetterCard.style.transform = 'scale(0.88)';
        setTimeout(() => bigLetterCard.style.transform = '', 200);
    }

    // 喇叭按钮点击（听音找字母中间的喇叭）
    function onSpeakerClick() {
        if (listenAnswered) return;
        // 加入简单的视觉反馈
        speakerBtn.style.transform = 'scale(0.9)';
        setTimeout(() => speakerBtn.style.transform = '', 150);
        speakNow(listenCorrectAnswer + ' ' + letterData[listenCorrectAnswer].word);
    }

    function nextListenQuestion() {
        listenAnswered = false;
        btnNextListen.style.display = 'none';
        buildListenRound();
    }

    function nextBlendWord() {
        blendFilledSlots = [];
        blendUsedChoices = new Set();
        btnNextBlend.style.display = 'none';
        buildBlendRound();
    }

    // ========== 字母探索 ==========
    function buildLetterGrid() {
        letterGrid.innerHTML = '';
        Object.keys(letterData).forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.textContent = letter;
            btn.onclick = () => selectLetter(letter, btn);
            letterGrid.appendChild(btn);
        });
        const first = letterGrid.querySelector('.letter-btn');
        if (first) first.classList.add('selected');
    }

    function selectLetter(letter, btn) {
        selectedLetter = letter;
        updateExploreDisplay();
        document.querySelectorAll('.letter-grid .letter-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        speakLetter(letter); // 点击字母立即发音
    }

    function updateExploreDisplay() {
        const data = letterData[selectedLetter];
        bigLetter.textContent = selectedLetter;
        exampleEmoji.textContent = data.emoji || '';
        document.querySelectorAll('.letter-grid .letter-btn').forEach(b => {
            b.classList.remove('selected');
            if (b.textContent === selectedLetter) b.classList.add('selected');
        });
    }

    // ========== 听音选字母 ==========
    function buildListenRound() {
        const keys = Object.keys(letterData);
        const correct = keys[Math.floor(Math.random() * keys.length)];
        listenCorrectAnswer = correct;
        const others = keys.filter(k => k !== correct);
        shuffleArray(others);
        const options = [correct, others[0], others[1], others[2]];
        shuffleArray(options);

        listenOptions.innerHTML = '';
        options.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'listen-option-btn';
            btn.textContent = letter;
            btn.onclick = () => handleListenChoice(letter, btn);
            listenOptions.appendChild(btn);
        });
        listenPrompt.textContent = '点喇叭听发音，再选字母';
    }

    function handleListenChoice(choice, btn) {
        if (listenAnswered) return;
        listenAnswered = true;
        // 移除喇叭的动画状态（如果有）
        speakerBtn.style.transform = '';

        if (choice === listenCorrectAnswer) {
            btn.classList.add('correct-flash');
            addStars(1);
            spawnConfetti(btn);
            celebrateOverlay.innerHTML = '<span class="celebrate-text">🎉</span>';
            setTimeout(() => celebrateOverlay.innerHTML = '', 900);
            listenPrompt.textContent = '太棒了！✅ 答对啦！';
            speakNow('Good job');
        } else {
            btn.classList.add('wrong-shake');
            listenPrompt.textContent = '再试试吧～正确答案是 ' + listenCorrectAnswer;
            document.querySelectorAll('.listen-option-btn').forEach(b => {
                if (b.textContent === listenCorrectAnswer) b.classList.add('correct-flash');
            });
            speakNow(listenCorrectAnswer);
        }
        btnNextListen.style.display = 'inline-flex';
        listenOptions.querySelectorAll('.listen-option-btn').forEach(b => b.style.pointerEvents = 'none');
    }

    // ========== 拼读小火车 ==========
    function buildBlendRound() {
        const wordData = cvcWords[Math.floor(Math.random() * cvcWords.length)];
        blendCurrentWord = wordData;
        blendEmoji.textContent = wordData.emoji;
        blendWordHint.textContent = wordData.hint;

        const letters = wordData.word.split('');
        const slotsCount = letters.length;
        const allLetters = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const distractors = [];
        const pool = allLetters.filter(l => !letters.includes(l));
        shuffleArray(pool);
        for (let i = 0; i < Math.min(2, pool.length); i++) distractors.push(pool[i].toUpperCase());
        const choices = [...letters.map(l => l.toUpperCase()), ...distractors];
        shuffleArray(choices);

        blendSlots.innerHTML = '';
        for (let i = 0; i < slotsCount; i++) {
            const slot = document.createElement('div');
            slot.className = 'blend-slot';
            slot.dataset.index = i;
            if (i === 0 && blendFilledSlots.length === 0) slot.classList.add('active-slot');
            blendSlots.appendChild(slot);
        }

        blendChoices.innerHTML = '';
        choices.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'blend-choice-btn';
            btn.textContent = letter;
            btn.dataset.letter = letter;
            if (blendUsedChoices.has(letter)) btn.classList.add('used');
            btn.onclick = () => handleBlendChoice(letter, btn);
            blendChoices.appendChild(btn);
        });

        blendFilledSlots = [];
        blendUsedChoices = new Set();
        updateBlendSlotHighlight();
    }

    function handleBlendChoice(letter, btn) {
        if (!blendCurrentWord || blendUsedChoices.has(letter)) return;
        const wordLetters = blendCurrentWord.word.split('');
        const next = blendFilledSlots.length;
        const expected = wordLetters[next].toUpperCase();

        if (letter === expected) {
            blendFilledSlots.push(letter);
            blendUsedChoices.add(letter);
            btn.classList.add('used');
            const slots = blendSlots.querySelectorAll('.blend-slot');
            if (slots[next]) {
                slots[next].textContent = letter;
                slots[next].classList.add('filled');
            }
            // 每填对一个字母就发声
            speakLetterSimple(letter);
            updateBlendSlotHighlight();

            if (blendFilledSlots.length === wordLetters.length) {
                // 拼写完成，朗读整个单词
                speakWord(blendCurrentWord.word, true);
                addStars(2);
                spawnConfetti(blendSlots);
                celebrateOverlay.innerHTML = '<span class="celebrate-text">🌟</span>';
                setTimeout(() => celebrateOverlay.innerHTML = '', 1000);
                blendWordHint.textContent = blendCurrentWord.word.toUpperCase() + ' 🎉';
                btnNextBlend.style.display = 'inline-flex';
                blendChoices.querySelectorAll('.blend-choice-btn').forEach(b => {
                    if (!blendUsedChoices.has(b.dataset.letter)) b.classList.add('used');
                });
            }
        } else {
            btn.classList.add('wrong-shake');
            setTimeout(() => btn.classList.remove('wrong-shake'), 500);
            blinkSlot(next);
        }
    }

    function updateBlendSlotHighlight() {
        blendSlots.querySelectorAll('.blend-slot').forEach((slot, i) => {
            slot.classList.remove('active-slot');
            if (i === blendFilledSlots.length && blendCurrentWord && blendFilledSlots.length < blendCurrentWord.word.length) {
                slot.classList.add('active-slot');
            }
        });
    }

    function blinkSlot(i) {
        const slot = blendSlots.querySelectorAll('.blend-slot')[i];
        if (slot) {
            slot.style.borderColor = '#f87171';
            setTimeout(() => { slot.style.borderColor = ''; updateBlendSlotHighlight(); }, 600);
        }
    }

    // ========== 星星与其他 ==========
    function updateStarDisplay(anim) {
        starCountEl.textContent = totalStars;
        if (anim) {
            starBadge.classList.remove('pulse');
            void starBadge.offsetWidth;
            starBadge.classList.add('pulse');
        }
