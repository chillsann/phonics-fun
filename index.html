<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Phonics Fun 🎈 自然拼读乐园</title>
    <style>
        :root { --pink: #f472b6; --purple: #a78bfa; --yellow: #fbbf24; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { height:100%; width:100%; overflow:hidden; font-family:system-ui; background:linear-gradient(160deg,#fdf2f8,#fce7f3,#ede9fe,#dbeafe,#fef3c7); display:flex; align-items:center; justify-content:center; }
        .app-container { width:100%; max-width:440px; height:100vh; display:flex; flex-direction:column; padding:12px 16px; }
        .top-bar { display:flex; align-items:center; justify-content:space-between; padding:8px 6px; }
        .star-badge { display:flex; align-items:center; gap:6px; background:#fff; border-radius:50px; padding:8px 16px; font-weight:700; font-size:17px; color:#4a3550; }
        .btn-icon { width:44px; height:44px; border-radius:50%; background:#fff; border:none; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.1); transition:0.2s; }
        .btn-icon:active { transform:scale(0.85); background:#fce7f3; }
        .screen { display:none; flex-direction:column; flex:1; overflow-y:auto; gap:16px; padding:4px; }
        .screen.active { display:flex; }
        .menu-header { text-align:center; padding:20px 0 10px; }
        .mascot { font-size:72px; animation:bounce 1.5s infinite; display:inline-block; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-22px)} 50%{transform:translateY(-6px)} 75%{transform:translateY(-16px)} }
        .menu-title { font-size:30px; font-weight:800; color:#4a3550; }
        .game-cards { display:flex; flex-direction:column; gap:14px; }
        .game-card { display:flex; align-items:center; gap:14px; background:#fff; border-radius:22px; padding:16px; cursor:pointer; border:3px solid transparent; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
        .game-card:active { transform:scale(0.96); }
        .card-emoji { font-size:44px; width:56px; text-align:center; }
        .card-title { font-size:18px; font-weight:700; color:#4a3550; }
        .card-desc { font-size:13px; color:#6b5b73; }
        .big-letter-card { display:inline-flex; flex-direction:column; align-items:center; justify-content:center; width:130px; height:150px; background:#fff; border-radius:22px; box-shadow:0 8px 20px rgba(0,0,0,0.1); cursor:pointer; border:4px solid #fce7f3; margin:20px auto; }
        .big-letter { font-size:64px; font-weight:900; color:#4a3550; }
        .example-emoji { font-size:38px; margin-top:4px; }
        .tap-hint { font-size:13px; color:#6b5b73; margin-top:6px; }
        .letter-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
        .letter-btn { aspect-ratio:1; border-radius:14px; border:2.5px solid #e8dff0; background:#fff; font-size:20px; font-weight:700; cursor:pointer; color:#4a3550; display:flex; align-items:center; justify-content:center; }
        .letter-btn.selected { background:#fce7f3; border-color:var(--pink); }
        .speaker-btn { width:90px; height:90px; border-radius:50%; border:4px solid #ede9fe; background:#fff; font-size:44px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; margin:15px auto; box-shadow:0 4px 10px rgba(0,0,0,0.1); transition:0.2s; }
        .speaker-btn:active { transform:scale(0.9); background:#ede9fe; }
        .listen-options { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .listen-option-btn { aspect-ratio:1.3; border-radius:22px; border:3px solid #e8dff0; background:#fff; font-size:40px; font-weight:900; cursor:pointer; color:#4a3550; display:flex; align-items:center; justify-content:center; }
        .listen-option-btn.correct-flash { background:#d1fae5; border-color:#34d399; }
        .listen-option-btn.wrong-shake { animation:shake 0.5s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(4px)} }
        .blend-slots { display:flex; justify-content:center; gap:14px; }
        .blend-slot { width:64px; height:72px; border-radius:14px; border:3px dashed #d4c8e0; background:rgba(255,255,255,0.7); display:flex; align-items:center; justify-content:center; font-size:38px; font-weight:900; color:#4a3550; }
        .blend-slot.filled { border-style:solid; border-color:var(--purple); background:#ede9fe; }
        .blend-letter-choices { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; }
        .blend-choice-btn { width:56px; height:60px; border-radius:14px; border:2.5px solid #e8dff0; background:#fff; font-size:30px; font-weight:800; cursor:pointer; color:#4a3550; display:flex; align-items:center; justify-content:center; }
        .blend-choice-btn.used { opacity:0.35; pointer-events:none; }
        .celebrate-overlay { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
        .celebrate-text { font-size:56px; animation:celebPop 0.8s ease; }
        @keyframes celebPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 50%{transform:scale(1.3) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:0} }
        .btn-back { display:inline-flex; align-items:center; gap:6px; background:#fff; border:2px solid #e8dff0; border-radius:50px; padding:10px 18px; font-size:15px; font-weight:600; cursor:pointer; color:#4a3550; }
        .btn-next { background:var(--purple); color:#fff; border:none; border-radius:50px; padding:12px 24px; font-size:16px; font-weight:700; cursor:pointer; display:none; margin:10px auto; }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="top-bar">
            <button class="btn-icon" onclick="switchScreen('screenMenu')">🏠</button>
            <div class="star-badge" id="starBadge"><span>⭐</span> <span id="starCount">0</span></div>
            <button class="btn-icon" id="btnRepeat" style="visibility:hidden;" onclick="repeatAction()">🔊</button>
        </div>

        <div class="screen active" id="screenMenu">
            <div class="menu-header">
                <div class="mascot">🦉</div>
                <div class="menu-title">Phonics Fun!</div>
                <p style="color:#6b5b73;">自然拼读乐园 · 点击开始</p>
            </div>
            <div class="game-cards">
                <div class="game-card" onclick="switchScreen('screenExplore')">
                    <div class="card-emoji">🔤</div>
                    <div><div class="card-title">字母声音探索</div><div class="card-desc">点击字母听发音</div></div>
                </div>
                <div class="game-card" onclick="switchScreen('screenListen')">
                    <div class="card-emoji">👂</div>
                    <div><div class="card-title">听音找字母</div><div class="card-desc">听发音，选字母</div></div>
                </div>
                <div class="game-card" onclick="switchScreen('screenBlend')">
                    <div class="card-emoji">🧩</div>
                    <div><div class="card-title">拼读小火车</div><div class="card-desc">拼字母，读单词</div></div>
                </div>
            </div>
        </div>

        <div class="screen" id="screenExplore">
            <button class="btn-back" onclick="switchScreen('screenMenu')">← 返回</button>
            <div style="text-align:center;">
                <div class="big-letter-card" onclick="speakLetter(selectedLetter)">
                    <span class="big-letter" id="bigLetter">A</span>
                    <span class="example-emoji" id="exampleEmoji">🍎</span>
                </div>
                <div class="tap-hint">👆 点击大卡片或下方字母听发音</div>
            </div>
            <div class="letter-grid" id="letterGrid"></div>
        </div>

        <div class="screen" id="screenListen">
            <button class="btn-back" onclick="switchScreen('screenMenu')">← 返回</button>
            <div style="text-align:center;">
                <button class="speaker-btn" id="speakerBtn" onclick="playListenSound()">🔊</button>
                <p id="listenPrompt" style="font-size:15px;color:#6b5b73;">点击喇叭听发音，然后选出字母</p>
            </div>
            <div class="listen-options" id="listenOptions"></div>
            <button class="btn-next" id="btnNextListen" onclick="nextListenQuestion()">下一题 →</button>
        </div>

        <div class="screen" id="screenBlend">
            <button class="btn-back" onclick="switchScreen('screenMenu')">← 返回</button>
            <div style="text-align:center;">
                <div id="blendEmoji" style="font-size:80px;">🐱</div>
                <div id="blendWordHint" style="font-size:14px;color:#6b5b73;">_ _ _</div>
            </div>
            <div class="blend-slots" id="blendSlots"></div>
            <div class="blend-letter-choices" id="blendChoices"></div>
            <button class="btn-next" id="btnNextBlend" onclick="nextBlendWord()">下一个单词 →</button>
        </div>
    </div>

    <div class="celebrate-overlay" id="celebrateOverlay"></div>

    <script>
        // ========== 音频系统（移植自 KET 游戏）==========
        let _ttsAudio = null;
        function initAudioElement() {
            if (_ttsAudio) return _ttsAudio;
            _ttsAudio = new Audio();
            _ttsAudio.preload = 'auto';
            _ttsAudio.setAttribute('playsinline', 'true');
            _ttsAudio.setAttribute('webkit-playsinline', 'true');
            return _ttsAudio;
        }

        // 有道 TTS URL
        function getTTSUrl(text) {
            return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2';
        }

        // 播放函数（完全参照 KET）
        function speakNow(text) {
            if (!text) return;
            const clean = text.replace(/,/g, ' ').trim();
            initAudioElement();
            _ttsAudio.pause();
            _ttsAudio.src = getTTSUrl(clean) + '&_t=' + Date.now();
            _ttsAudio.play().catch(() => {
                // 降级到系统语音（极少数情况）
                if ('speechSynthesis' in window) {
                    const synth = window.speechSynthesis;
                    synth.cancel();
                    const utter = new SpeechSynthesisUtterance(clean);
                    utter.lang = 'en-US';
                    utter.rate = 0.9;
                    synth.speak(utter);
                }
            });
        }

        // 首次交互解锁音频（与 KET 一模一样）
        function unlockAudio() {
            initAudioElement();
            _ttsAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
            _ttsAudio.play().catch(() => {});
        }
        ['touchstart', 'touchend', 'click', 'pointerdown'].forEach(evt => {
            document.addEventListener(evt, unlockAudio, { once: true });
        });

        // 语音接口
        function speakLetter(letter) {
            const data = letterData[letter];
            if (!data) return;
            speakNow(letter + ' ' + data.word);
        }
        function speakWord(word, slow = false) {
            if (slow) {
                const arr = word.split('');
                speakNow(arr.join(' . ') + ' . ' + word);
            } else {
                speakNow(word);
            }
        }
        function speakLetterSimple(letter) { speakNow(letter); }

        // 听音选字母的喇叭
        function playListenSound() {
            if (listenAnswered) return;
            const btn = document.getElementById('speakerBtn');
            btn.classList.add('playing');
            speakNow(listenCorrectAnswer + ' ' + letterData[listenCorrectAnswer].word);
            setTimeout(() => btn.classList.remove('playing'), 800);
            document.getElementById('listenPrompt').textContent = '仔细听...是哪个字母呢？🤔';
        }

        // 右上角重复按钮
        function repeatAction() {
            if (currentScreen === 'screenExplore') speakLetter(selectedLetter);
            else if (currentScreen === 'screenListen') playListenSound();
            else if (currentScreen === 'screenBlend' && blendCurrentWord) speakWord(blendCurrentWord.word, true);
        }

        // ========== 游戏逻辑 ==========
        let totalStars = parseInt(localStorage.getItem('phonicsFunStars') || '0');
        let currentScreen = 'screenMenu';
        let selectedLetter = 'A';
        let listenCorrectAnswer = '';
        let listenAnswered = false;
        let blendCurrentWord = null;
        let blendFilledSlots = [];
        let blendUsedChoices = new Set();

        function switchScreen(name) {
            currentScreen = name;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            document.getElementById('btnRepeat').style.visibility = (name === 'screenMenu') ? 'hidden' : 'visible';
            if (name === 'screenListen') {
                listenAnswered = false;
                document.getElementById('btnNextListen').style.display = 'none';
                document.getElementById('listenPrompt').textContent = '点击喇叭听发音，然后选出字母';
                buildListenRound();
            } else if (name === 'screenBlend') {
                blendFilledSlots = [];
                blendUsedChoices = new Set();
                document.getElementById('btnNextBlend').style.display = 'none';
                buildBlendRound();
            } else if (name === 'screenExplore') {
                updateExploreDisplay();
            }
            document.getElementById(name).scrollTop = 0;
        }

        function nextListenQuestion() {
            listenAnswered = false;
            document.getElementById('btnNextListen').style.display = 'none';
            document.getElementById('listenPrompt').textContent = '点击喇叭听发音，然后选出字母';
            buildListenRound();
        }

        function nextBlendWord() {
            blendFilledSlots = [];
            blendUsedChoices = new Set();
            document.getElementById('btnNextBlend').style.display = 'none';
            buildBlendRound();
        }

        // ========== 字母探索 ==========
        function buildLetterGrid() {
            const grid = document.getElementById('letterGrid');
            grid.innerHTML = '';
            Object.keys(letterData).forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.onclick = () => selectLetter(letter, btn);
                grid.appendChild(btn);
            });
            const first = grid.querySelector('.letter-btn');
            if (first) first.classList.add('selected');
        }

        function selectLetter(letter, btn) {
            selectedLetter = letter;
            updateExploreDisplay();
            document.querySelectorAll('.letter-grid .letter-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            speakLetter(letter);
        }

        function updateExploreDisplay() {
            document.getElementById('bigLetter').textContent = selectedLetter;
            document.getElementById('exampleEmoji').textContent = letterData[selectedLetter].emoji;
            document.querySelectorAll('.letter-grid .letter-btn').forEach(b => {
                b.classList.remove('selected');
                if (b.textContent === selectedLetter) b.classList.add('selected');
            });
        }

        // ========== 听音选字母 ==========
        function buildListenRound() {
            const keys = Object.keys(letterData);
            const correct = keys[Math.floor(Math.random() * keys.length)];
            listenCorrectAnswer = correct;
            const others = keys.filter(k => k !== correct);
            shuffleArray(others);
            const options = [correct, others[0], others[1], others[2]];
            shuffleArray(options);
            const container = document.getElementById('listenOptions');
            container.innerHTML = '';
            options.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'listen-option-btn';
                btn.textContent = letter;
                btn.onclick = () => checkListenAnswer(letter, btn);
                container.appendChild(btn);
            });
        }

        function checkListenAnswer(choice, btn) {
            if (listenAnswered) return;
            listenAnswered = true;
            document.getElementById('speakerBtn').classList.remove('playing');
            const allBtns = document.querySelectorAll('.listen-option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            if (choice === listenCorrectAnswer) {
                btn.classList.add('correct-flash');
                addStars(1);
                document.getElementById('celebrateOverlay').innerHTML = '<span class="celebrate-text">🎉</span>';
                setTimeout(() => celebrateOverlay.innerHTML = '', 800);
                document.getElementById('listenPrompt').textContent = '太棒了！✅ 答对啦！';
                speakNow('Good job');
            } else {
                btn.classList.add('wrong-shake');
                document.getElementById('listenPrompt').textContent = '再试试吧～正确答案是 ' + listenCorrectAnswer;
                allBtns.forEach(b => { if (b.textContent === listenCorrectAnswer) b.classList.add('correct-flash'); });
                speakNow(listenCorrectAnswer);
            }
            document.getElementById('btnNextListen').style.display = 'inline-flex';
        }

        // ========== 拼读游戏 ==========
        function buildBlendRound() {
            const wordData = cvcWords[Math.floor(Math.random() * cvcWords.length)];
            blendCurrentWord = wordData;
            document.getElementById('blendEmoji').textContent = wordData.emoji;
            document.getElementById('blendWordHint').textContent = wordData.hint;
            const letters = wordData.word.split('');
            const slots = document.getElementById('blendSlots');
            slots.innerHTML = '';
            for (let i = 0; i < letters.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'blend-slot';
                slot.dataset.index = i;
                if (i === 0) slot.classList.add('active-slot');
                slots.appendChild(slot);
            }
            const allLetters = 'abcdefghijklmnopqrstuvwxyz'.split('');
            const distractors = [];
            const pool = allLetters.filter(l => !letters.includes(l));
            shuffleArray(pool);
            for (let i = 0; i < Math.min(2, pool.length); i++) distractors.push(pool[i].toUpperCase());
            const choices = [...letters.map(l => l.toUpperCase()), ...distractors];
            shuffleArray(choices);
            const choicesDiv = document.getElementById('blendChoices');
            choicesDiv.innerHTML = '';
            choices.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'blend-choice-btn';
                btn.textContent = letter;
                btn.dataset.letter = letter;
                btn.onclick = () => handleBlendChoice(letter, btn);
                choicesDiv.appendChild(btn);
            });
            blendFilledSlots = [];
            blendUsedChoices = new Set();
        }

        function handleBlendChoice(letter, btn) {
            if (!blendCurrentWord || blendUsedChoices.has(letter)) return;
            const wordLetters = blendCurrentWord.word.split('');
            const nextIdx = blendFilledSlots.length;
            const expected = wordLetters[nextIdx].toUpperCase();
            if (letter === expected) {
                blendFilledSlots.push(letter);
                blendUsedChoices.add(letter);
                btn.classList.add('used');
                const slots = document.querySelectorAll('.blend-slot');
                slots[nextIdx].textContent = letter;
                slots[nextIdx].classList.add('filled');
                speakLetterSimple(letter);
                slots.forEach((s, i) => {
                    s.classList.remove('active-slot');
                    if (i === blendFilledSlots.length && i < wordLetters.length) s.classList.add('active-slot');
                });
                if (blendFilledSlots.length === wordLetters.length) {
                    speakWord(blendCurrentWord.word, true);
                    addStars(2);
                    document.getElementById('celebrateOverlay').innerHTML = '<span class="celebrate-text">🌟</span>';
                    setTimeout(() => celebrateOverlay.innerHTML = '', 1000);
                    document.getElementById('blendWordHint').textContent = blendCurrentWord.word.toUpperCase() + ' 🎉';
                    document.getElementById('btnNextBlend').style.display = 'inline-flex';
                }
            } else {
                btn.classList.add('wrong-shake');
                setTimeout(() => btn.classList.remove('wrong-shake'), 500);
            }
        }

        // 星星
        function addStars(n) { totalStars += n; document.getElementById('starCount').textContent = totalStars; localStorage.setItem('phonicsFunStars', totalStars); }
        function shuffleArray(arr) { for (let i=arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

        // 数据
        const letterData = {
            'A':{emoji:'🍎',word:'apple'}, 'B':{emoji:'⚽',word:'ball'}, 'C':{emoji:'🐱',word:'cat'},
            'D':{emoji:'🐶',word:'dog'}, 'E':{emoji:'🥚',word:'egg'}, 'F':{emoji:'🐟',word:'fish'},
            'G':{emoji:'🐐',word:'goat'}, 'H':{emoji:'🎩',word:'hat'}, 'I':{emoji:'🧊',word:'igloo'},
            'J':{emoji:'🍯',word:'jam'}, 'K':{emoji:'🪁',word:'kite'}, 'L':{emoji:'🦁',word:'lion'},
            'M':{emoji:'🌙',word:'moon'}, 'N':{emoji:'👃',word:'nose'}, 'O':{emoji:'🐙',word:'octopus'},
            'P':{emoji:'🐷',word:'pig'}, 'Q':{emoji:'👸',word:'queen'}, 'R':{emoji:'🐰',word:'rabbit'},
            'S':{emoji:'☀️',word:'sun'}, 'T':{emoji:'🔝',word:'top'}, 'U':{emoji:'☂️',word:'umbrella'},
            'V':{emoji:'🚐',word:'van'}, 'W':{emoji:'🌊',word:'wave'}, 'X':{emoji:'🦊',word:'fox'},
            'Y':{emoji:'🪀',word:'yo-yo'}, 'Z':{emoji:'🦓',word:'zebra'}
        };
        const cvcWords = [
            {word:'cat',emoji:'🐱',hint:'c-a-t'},{word:'dog',emoji:'🐶',hint:'d-o-g'},{word:'pig',emoji:'🐷',hint:'p-i-g'},
            {word:'hen',emoji:'🐔',hint:'h-e-n'},{word:'bug',emoji:'🐛',hint:'b-u-g'},{word:'sun',emoji:'☀️',hint:'s-u-n'},
            {word:'hat',emoji:'🎩',hint:'h-a-t'},{word:'bed',emoji:'🛏️',hint:'b-e-d'},{word:'cup',emoji:'🥤',hint:'c-u-p'},
            {word:'fox',emoji:'🦊',hint:'f-o-x'},{word:'bus',emoji:'🚌',hint:'b-u-s'},{word:'pen',emoji:'🖊️',hint:'p-e-n'},
            {word:'lip',emoji:'👄',hint:'l-i-p'},{word:'pot',emoji:'🍯',hint:'p-o-t'},{word:'nut',emoji:'🥜',hint:'n-u-t'}
        ];

        // 启动
        buildLetterGrid();
        buildListenRound();
        buildBlendRound();
    </script>
</body>
</html>
